name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Remove today's packages so pkg_build.sh uses a clean date version (no collision suffix)
      - name: Clean today's packages
        run: |
          today=$(date +"%Y.%m.%d")
          rm -f archive/appdata.cleanup.ng-${today}*-x86_64-1.txz

      - name: Build package
        run: |
          chmod +x pkg_build.sh
          ./pkg_build.sh

      - name: Extract version
        id: version
        run: |
          version=$(grep -oP '<!ENTITY version\s+"\K[^"]+' plugins/appdata.cleanup.ng.plg)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "file=appdata.cleanup.ng-${version}-x86_64-1.txz" >> "$GITHUB_OUTPUT"

      - name: Commit release
        run: |
          git add -A
          git commit -m "Release ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Appdata Cleanup NG v${{ steps.version.outputs.version }}

            Install in Unraid (Plugins > Install Plugin):
            `https://raw.githubusercontent.com/chodeus/appdata.cleanup.ng/main/plugins/appdata.cleanup.ng.plg`

            See the manifest CHANGES for details.
          files: archive/${{ steps.version.outputs.file }}
          draft: false
          prerelease: false
